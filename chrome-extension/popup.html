<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levonis Store Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #1a1a1a;
      font-size: 18px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: #d4af37;
    }

    .subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .status {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
    }

    .status-dot.inactive {
      background: #666;
    }

    .status-text {
      font-size: 13px;
      color: #ccc;
    }

    .stores {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .store-badge {
      padding: 6px 12px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 20px;
      font-size: 11px;
      color: #d4af37;
    }

    .instructions {
      background: rgba(212, 175, 55, 0.1);
      border-radius: 10px;
      padding: 15px;
      font-size: 12px;
      line-height: 1.6;
      color: #ccc;
    }

    .instructions strong {
      color: #d4af37;
    }

    .instructions ol {
      margin: 10px 0 0 0;
      padding-right: 20px;
    }

    .instructions li {
      margin-bottom: 5px;
    }

    .footer {
      margin-top: 15px;
      text-align: center;
      font-size: 10px;
      color: #666;
    }

    .footer a {
      color: #d4af37;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">L</div>
      <div>
        <div class="title">Levonis Store Helper</div>
        <div class="subtitle">مساعد التسوق الذكي</div>
      </div>
    </div>

    <div class="status">
      <div class="status-item">
        <div class="status-dot"></div>
        <span class="status-text">الإضافة نشطة</span>
      </div>
      <div class="status-item">
        <div class="status-dot" id="pageStatus"></div>
        <span class="status-text" id="pageText">جاري الفحص...</span>
      </div>
    </div>

    <div class="stores">
      <span class="store-badge">Amazon</span>
      <span class="store-badge">Newegg</span>
      <span class="store-badge">BestBuy</span>
    </div>

    <div class="instructions">
      <strong>كيفية الاستخدام:</strong>
      <ol>
        <li>افتح صفحة أي منتج</li>
        <li>اضغط على زر "إرسال إلى Levonis"</li>
        <li>سيتم فتح Levonis مع بيانات المنتج</li>
      </ol>
    </div>

    <div class="footer">
      <a href="https://levonis.lovable.app" target="_blank">levonis.lovable.app</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
