<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="proGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF"/>
      <stop offset="30%" style="stop-color:#00BCD4"/>
      <stop offset="70%" style="stop-color:#00ACC1"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <linearGradient id="proGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B9F2FF"/>
      <stop offset="100%" style="stop-color:#00BCD4"/>
    </linearGradient>
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#proGrad1)" stroke-width="5" filter="url(#cyanGlow)"/>
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#proGrad2)" stroke-width="2" opacity="0.6"/>
  <!-- Diamond shapes -->
  <g fill="#00E5FF" opacity="0.8">
    <polygon points="50,2 53,8 50,14 47,8" />
    <polygon points="50,86 53,92 50,98 47,92" />
    <polygon points="2,50 8,53 14,50 8,47" />
    <polygon points="86,50 92,53 98,50 92,47" />
  </g>
</svg>