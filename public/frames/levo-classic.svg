<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="classicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8"/>
      <stop offset="25%" style="stop-color:#C0C0C0"/>
      <stop offset="50%" style="stop-color:#B8B8B8"/>
      <stop offset="75%" style="stop-color:#C0C0C0"/>
      <stop offset="100%" style="stop-color:#E8E8E8"/>
    </linearGradient>
    <filter id="silverGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#classicGrad)" stroke-width="5" filter="url(#silverGlow)"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#C0C0C0" stroke-width="1" opacity="0.5" stroke-dasharray="4 2"/>
</svg>