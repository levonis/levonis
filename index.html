    <style>
      html, body { background-color: #103d33; margin: 0; }
      #initial-loader {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #123f35 0%, #0b3028 100%);
        transition: opacity 0.4s ease;
      }
      #initial-loader.fade-out { opacity: 0; pointer-events: none; }
      #il-recover {
        position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
        display: none; flex-direction: column; align-items: center; gap: 12px;
        font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        text-align: center; color: #d8c887; max-width: 320px; padding: 0 20px;
      }
      #il-recover.show { display: flex; }
      #il-recover p { margin: 0; font-size: 14px; opacity: 0.85; line-height: 1.6; }
      #il-recover button {
        background: linear-gradient(135deg, #c7b46c 0%, #8e6c3d 100%);
        color: #0b3028; border: none; padding: 12px 28px; border-radius: 10px;
        font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer;
        box-shadow: 0 4px 14px rgba(199, 180, 108, 0.3);
      }
      #il-recover button:active { transform: scale(0.97); }
      #initial-loader .il-wrap {
        position: relative;
        width: 120px; height: 120px;
        display: flex; align-items: center; justify-content: center;
      }
      #initial-loader .il-ring {
        position: absolute; inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(199, 180, 108, 0.15);
        border-top-color: #c7b46c;
        border-right-color: rgba(199, 180, 108, 0.5);
        animation: il-spin 1.6s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      #initial-loader .il-ring-inner {
        position: absolute; inset: 14px;
        border-radius: 50%;
        border: 1px solid rgba(216, 200, 135, 0.1);
        border-bottom-color: #d8c887;
        animation: il-spin 2.2s cubic-bezier(0.65, 0, 0.35, 1) infinite reverse;
      }
      #initial-loader .il-logo {
        position: relative;
        font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-weight: 900; font-size: 28px;
        letter-spacing: 0.15em;
        background: linear-gradient(135deg, #d8c887 0%, #c7b46c 50%, #8e6c3d 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: il-glow 2s ease-in-out infinite;
      }
      @keyframes il-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes il-glow {
        0%, 100% { opacity: 1; filter: drop-shadow(0 0 8px rgba(199, 180, 108, 0.4)); }
        50% { opacity: 0.7; filter: drop-shadow(0 0 16px rgba(216, 200, 135, 0.6)); }
      }
    </style>

  <body>
    <div id="root"></div>
    <div id="initial-loader">
      <div class="il-wrap">
        <div class="il-ring"></div>
        <div class="il-ring-inner"></div>
        <div class="il-logo">L</div>
      </div>
      <div id="il-recover">
        <p>التحميل يستغرق وقتاً أطول من المعتاد</p>
        <button onclick="window.__levoRecover()">إعادة المحاولة</button>
      </div>
    </div>
    <script>
      // Safety net: if React doesn't mount within 8s, show recovery UI.
      // If user clicks retry, clear all caches + service workers, then hard reload.
      (function () {
        var IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        var SHOW_RECOVERY_AFTER = IS_MOBILE ? 5000 : 8000;
        var FORCE_RELOAD_AFTER = IS_MOBILE ? 12000 : 20000;

        window.__levoMounted = false;

        var showTimer = setTimeout(function () {
          if (window.__levoMounted) return;
          var rec = document.getElementById('il-recover');
          if (rec) rec.classList.add('show');
        }, SHOW_RECOVERY_AFTER);

        // Auto-recover once after 20s of no mount (network/chunk failure)
        var autoTimer = setTimeout(function () {
          if (window.__levoMounted) return;
          if (sessionStorage.getItem('__levo_auto_recovered')) return;
          sessionStorage.setItem('__levo_auto_recovered', '1');
          window.__levoRecover();
        }, FORCE_RELOAD_AFTER);

        window.addEventListener('levo:mounted', function () {
          window.__levoMounted = true;
          clearTimeout(showTimer);
          clearTimeout(autoTimer);
        });

        window.__levoRecover = function () {
          var clearAll = Promise.resolve();
          try {
            if ('serviceWorker' in navigator) {
              clearAll = navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              });
            }
          } catch (e) {}

          clearAll
            .then(function () {
              if ('caches' in window) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            })
            .catch(function () {})
            .then(function () {
              try { localStorage.removeItem('__levo_chunk_retry'); } catch (e) {}
              window.location.reload();
            });
        };

        // Catch chunk-load failures (common cause of green-screen hang on flaky networks)
        window.addEventListener('error', function (e) {
          var msg = (e && e.message) || '';
          var src = (e && e.target && (e.target.src || e.target.href)) || '';
          if (
            msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            msg.indexOf('Importing a module script failed') !== -1 ||
            (src && /\.(js|mjs|css)(\?|$)/.test(src))
          ) {
            var rec = document.getElementById('il-recover');
            if (rec && !window.__levoMounted) rec.classList.add('show');
          }
        }, true);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
