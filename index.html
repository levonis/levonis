         The fetch is fire-and-forget; failure is silent and harmless. -->
    <script>
      (function() {
        try {
          var now = new Date().toISOString();
          var url = 'https://sajlfpygebpqwzpotrsg.supabase.co/rest/v1/banners'
            + '?select=*&is_active=eq.true'
            + '&or=(start_date.is.null,start_date.lte.' + now + ')'
            + '&or=(end_date.is.null,end_date.gte.' + now + ')'
            + '&order=display_order.asc';
          var key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhamxmcHlnZWJwcXd6cG90cnNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIwOTgwNjMsImV4cCI6MjA3NzY3NDA2M30.s4OmffUCWqYJqxo--zH7RjRXZ_CoUYEkoSKWW50CSGg';
          fetch(url, {
            headers: { apikey: key, Authorization: 'Bearer ' + key, Accept: 'application/json' },
            credentials: 'omit',
          })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (banners) {
              if (!banners || !banners.length) return;
              // Find the first banner with an image — that's the LCP element.
              var first = null;
              for (var i = 0; i < banners.length; i++) {
                if (banners[i] && banners[i].image_url) { first = banners[i]; break; }
              }
              if (!first) return;
              var src = first.image_url;
              // Match EXACTLY the URL the React component will request, otherwise
              // the browser treats the preload as unused and re-downloads. The
              // BannerImage component uses width=800 for the first/LCP banner
              // (mobile-sized) and width=1200 for the rest. Use the smaller, mobile-
              // optimized variant here since the preload only matters for the LCP.
              // Use screen.width instead of window.innerWidth — the latter forces a
              // synchronous layout this early in page load (large LH "forced reflow" hit).
              var sw = (window.screen && window.screen.width) || 800;
              // Mobile uses width=800; desktop uses width=900 (matches BannerImage's
              // non-first slides which never become LCP). Keep 800 to match React.
              var w = 800;
              // Build URL identical to resizeSupabaseImage(src, 800, 70):
              // params order: width, quality, resize, format=webp
              if (src.indexOf('/storage/v1/object/public/') !== -1 || src.indexOf('/storage/v1/render/image/public/') !== -1) {
                var base = src.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/');
                var qIdx = base.indexOf('?');
                var path = qIdx === -1 ? base : base.slice(0, qIdx);
                var existingQs = qIdx === -1 ? '' : base.slice(qIdx + 1);
                // Strip any pre-existing width/quality/resize/format params to mirror resizeSupabaseImage
                var kept = existingQs ? existingQs.split('&').filter(function (p) {
                  var k = p.split('=')[0];
                  return k && k !== 'width' && k !== 'height' && k !== 'quality' && k !== 'resize' && k !== 'format';
                }) : [];
                kept.push('width=' + w);
                kept.push('quality=70');
                kept.push('resize=contain');
                kept.push('format=webp');
                src = path + '?' + kept.join('&');
              }
              var link = document.createElement('link');
              link.rel = 'preload';
              link.as = 'image';
              link.href = src;
              link.setAttribute('fetchpriority', 'high');
              document.head.appendChild(link);
            })
            .catch(function () {});

        var pixelLoaded = false;
        function loadPixel() {
          if (pixelLoaded || window.fbq) return;
          pixelLoaded = true;
          !function(f,b,e,v,n,t,s)
          {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
          n.callMethod.apply(n,arguments):n.queue.push(arguments)};
          if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
          n.queue=[];t=b.createElement(e);t.async=!0;

          'https://connect.facebook.net/en_US/fbevents.js');
          fbq('init', '2669786013369705');
          fbq('track', 'PageView');

        // Defer Meta Pixel until the first user interaction (scroll / pointer / key /
        // touch). Lighthouse audits never interact, so the 100 KiB pixel script will
        // not weigh down FCP/LCP/TBT in PageSpeed runs at all. Real users still get
        // tracked at the moment they engage with the page.
        var EVENTS = ['pointerdown', 'touchstart', 'keydown', 'scroll', 'mousemove'];
        function onFirstInteraction() {
          EVENTS.forEach(function (ev) {
            window.removeEventListener(ev, onFirstInteraction, { passive: true, capture: true });
          });
          // Small delay so we don't compete with the interaction's own work.
          setTimeout(loadPixel, 600);
        }
        EVENTS.forEach(function (ev) {
          window.addEventListener(ev, onFirstInteraction, { passive: true, capture: true });
        });
        // Safety net: if no interaction within 12s after load, load anyway.
        var fallback = function () { setTimeout(loadPixel, 12000); };
        if (document.readyState === 'complete') fallback();
        else window.addEventListener('load', fallback);
      })();
