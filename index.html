    <!-- LCP optimization: kick off the active-banners fetch BEFORE the JS bundle
         parses. The response is cached by the browser, so when React's TanStack
         Query fires the same request, it resolves instantly. This eliminates
         most of the ~3.2s "Resource load delay" on the LCP banner image.
         The fetch is fire-and-forget; failure is silent and harmless. -->
    <script>
      (function() {
        try {
          var now = new Date().toISOString();
          var url = 'https://sajlfpygebpqwzpotrsg.supabase.co/rest/v1/banners'
            + '?select=*&is_active=eq.true'
            + '&or=(start_date.is.null,start_date.lte.' + now + ')'
            + '&or=(end_date.is.null,end_date.gte.' + now + ')'
            + '&order=display_order.asc';
          var key = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhamxmcHlnZWJwcXd6cG90cnNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIwOTgwNjMsImV4cCI6MjA3NzY3NDA2M30.s4OmffUCWqYJqxo--zH7RjRXZ_CoUYEkoSKWW50CSGg';
          fetch(url, {
            headers: { apikey: key, Authorization: 'Bearer ' + key, Accept: 'application/json' },
            credentials: 'omit',
          })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (banners) {
              if (!banners || !banners.length) return;
              // Find the first banner with an image — that's the LCP element.
              var first = null;
              for (var i = 0; i < banners.length; i++) {
                if (banners[i] && banners[i].image_url) { first = banners[i]; break; }
              }
              if (!first) return;
              var src = first.image_url;
              // Match EXACTLY the URL the React component will request, otherwise
              // the browser treats the preload as unused and re-downloads. The
              // BannerImage component uses width=800 for the first/LCP banner
              // (mobile-sized) and width=1200 for the rest. Use the smaller, mobile-
              // optimized variant here since the preload only matters for the LCP.
              // Use screen.width instead of window.innerWidth — the latter forces a
              // synchronous layout this early in page load (large LH "forced reflow" hit).
              var sw = (window.screen && window.screen.width) || 800;
              var w = sw > 900 ? 1200 : 800;
              if (src.indexOf('/storage/v1/object/public/') !== -1) {
                src = src.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/')
                  + (src.indexOf('?') === -1 ? '?' : '&') + 'width=' + w + '&quality=75&resize=contain';
              }
              var link = document.createElement('link');
              link.rel = 'preload';
              link.as = 'image';
              link.href = src;
              link.setAttribute('fetchpriority', 'high');
              document.head.appendChild(link);
            })
            .catch(function () {});
        } catch (e) {}
      })();
    </script>

  <script>
    // One-shot SW + cache cleanup for users stuck on old chunk hashes.
    // Runs ONCE per browser (guarded by localStorage flag) instead of every load,
    // so it doesn't destroy the cache and slow down repeat visits.
    (function () {
      try {
        if (localStorage.getItem('__levo_sw_cleaned_v14') === '1') return;
        localStorage.setItem('__levo_sw_cleaned_v14', '1');
      } catch (e) {}
      try { localStorage.removeItem('__levo_recovery_attempts'); } catch (e) {}
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        }).catch(function () {});
      }
      if ('caches' in window) {
        caches.keys().then(function (keys) {
          keys.forEach(function (k) { caches.delete(k); });
        }).catch(function () {});
      }
    })();
  </script>

    <script>
      // Safety net: if React doesn't mount in time, show recovery UI.
      // Auto-recover only twice — after that show a clear "slow connection" message
      // instead of looping cache wipes (which makes things worse on flaky networks).
      (function () {
        var IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
        // Be generous: many IQ mobile networks take 10-20s for first paint.
        // Showing the "slow" UI too early scares users into hammering retry,
        // which wipes caches and makes the next load even slower.
        var SHOW_RECOVERY_AFTER = IS_MOBILE ? 15000 : 12000;
        var FORCE_RELOAD_AFTER = IS_MOBILE ? 60000 : 45000;
        var MAX_AUTO_RECOVERIES = 1;

        window.__levoMounted = false;

        function getAttempts() {
          try { return parseInt(localStorage.getItem('__levo_recovery_attempts') || '0', 10) || 0; } catch (e) { return 0; }
        }
        function setAttempts(n) {
          try { localStorage.setItem('__levo_recovery_attempts', String(n)); } catch (e) {}
        }

        function showRecovery(message) {
          var loader = document.getElementById('initial-loader');
          var rec = document.getElementById('il-recover');
          if (!rec || !loader) return;
          if (message) {
            var p = rec.querySelector('p');
            if (p) p.textContent = message;
          }
          loader.classList.add('show');
        }

        var showTimer = setTimeout(function () {
          if (window.__levoMounted) return;
          if (getAttempts() >= MAX_AUTO_RECOVERIES) {
            showRecovery('اتصالك بطيء — جرّب شبكة أخرى ثم اضغط إعادة المحاولة');
          } else {
            showRecovery();
          }
        }, SHOW_RECOVERY_AFTER);

        var autoTimer = setTimeout(function () {
          if (window.__levoMounted) return;
          var attempts = getAttempts();
          if (attempts >= MAX_AUTO_RECOVERIES) {
            showRecovery('اتصالك بطيء — جرّب شبكة أخرى ثم اضغط إعادة المحاولة');
            return;
          }
          setAttempts(attempts + 1);
          window.__levoRecover();
        }, FORCE_RELOAD_AFTER);

        window.addEventListener('levo:mounted', function () {
          window.__levoMounted = true;
          clearTimeout(showTimer);
          clearTimeout(autoTimer);
          setAttempts(0);
        });

        window.__levoRecover = function () {
          var clearAll = Promise.resolve();
          try {
            if ('serviceWorker' in navigator) {
              clearAll = navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              });
            }
          } catch (e) {}

          clearAll
            .then(function () {
              if ('caches' in window) {
                return caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k); }));
                });
              }
            })
            .catch(function () {})
            .then(function () {
              try { localStorage.removeItem('__levo_chunk_retry'); } catch (e) {}
              window.location.reload();
            });
        };

        // Self-heal: if ANY JS chunk fails to load before mount, it almost always
        // means a stale Service Worker is serving a stale index.html that points to
        // chunk hashes that no longer exist after a deploy. Auto-nuke SW + caches
        // and reload ONCE — far faster than the 25s force-reload timer.
        var SELF_HEAL_KEY = '__levo_self_healed_v13';
        function selfHealOnce() {
          if (window.__levoMounted) return;
          try { if (sessionStorage.getItem(SELF_HEAL_KEY)) return; } catch (e) {}
          try { sessionStorage.setItem(SELF_HEAL_KEY, '1'); } catch (e) {}
          window.__levoRecover();
        }
        window.addEventListener('error', function (e) {
          var msg = (e && e.message) || '';
          var src = (e && e.target && (e.target.src || e.target.href)) || '';
          var isChunkErr =
            msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            msg.indexOf('Importing a module script failed') !== -1 ||
            (src && /\.(js|mjs)(\?|$)/.test(src));
          if (!isChunkErr) return;
          if (!window.__levoMounted) {
            showRecovery();
            selfHealOnce();
          }
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          var msg = (e && e.reason && (e.reason.message || String(e.reason))) || '';
          if (msg.indexOf('Failed to fetch dynamically imported module') !== -1 ||
              msg.indexOf('Importing a module script failed') !== -1 ||
              msg.indexOf('error loading dynamically imported module') !== -1) {
            if (!window.__levoMounted) {
              showRecovery();
              selfHealOnce();
            }
          }
        });
      })();
    </script>
