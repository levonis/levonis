name = "levonis-og"
main = "og-worker.js"
compatibility_date = "2024-10-01"

# Set these before deploying:
[vars]
# Your Supabase project ref (the subdomain of *.supabase.co)
SUPABASE_PROJECT_REF = "REPLACE_WITH_PROJECT_REF"
# Origin that serves the SPA HTML (Lovable published URL)
ORIGIN = "https://levonis.lovable.app"

# Bind the worker to your custom domain routes AFTER first deploy.
# You can also configure routes in the Cloudflare dashboard instead.
# [[routes]]
# pattern = "levonisiq.com/product/*"
# zone_name = "levonisiq.com"
# [[routes]]
# pattern = "levonisiq.com/stl/*"
# zone_name = "levonisiq.com"
# [[routes]]
# pattern = "levonisiq.com/s/*"
# zone_name = "levonisiq.com"
